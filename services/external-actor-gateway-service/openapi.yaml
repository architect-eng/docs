openapi: 3.1.0
info:
  contact:
    email: api-support@tryarchitect.com
    name: Architect
    url: https://tryarchitect.com
  description: |-
    The Customer API lets you manage pages, audiences, persons, accounts, topics, page links, analytics, and webhook subscriptions.

    ## Authentication
    Send your API key in the `x-api-key` header on every request.

    ## Terminology
    - **Page**: a top-level customer experience container.
    - **Audience**: a targeted experience that belongs to a Page.
    - **Version**: a generated or editable Audience state, including drafts and published versions.
    - **Person**: an individual contact record.

    ## Pagination
    Collection endpoints use `limit` and `cursor`. When another page is available, pass the returned `nextCursor` value back as `cursor`. When there are no more results, `nextCursor` is `null`.

    ## Webhooks
    Create subscriptions with `POST /v0/webhook_subscriptions`. The `signingSecret` is returned only once, when the subscription is created, so store it securely.

    Webhook deliveries are sent as `POST` requests with these headers:
    - `X-Webhook-Signature-256`: HMAC-SHA256 of the raw request body, prefixed with `sha256=`
    - `X-Webhook-Timestamp`: Unix timestamp in milliseconds used when the signature was generated

    Webhook deliveries are at-least-once. Use `eventId` for idempotency and return a `2xx` response quickly after persisting work.

    Example delivery body:
    ```json
    {
      "timestamp": "2024-01-15T10:30:00.000Z",
      "eventId": "event_01j5k9m7n8p9q2r3s4t5v6w7x8",
      "payload": {
        "type": "page.version.created",
        "pageId": "page_01j5k9m7n8p9q2r3s4t5v6w7x8",
        "versionId": "<audience_version_id>",
        "createdAt": "2024-01-15T10:30:00.000Z"
      }
    }
    ```

    Version webhook event names currently use the internal `page.version.*` namespace. In Customer API terms, these correspond to Audience version lifecycle events.
  title: Architect - Customer API
  version: 0.0.1
