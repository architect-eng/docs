  securitySchemes:
    apiKey:
      description: API key authentication for the External Actor Gateway
      in: header
      name: x-api-key
      type: apiKey
paths:
  /v0/account_logs:
    post:
      description: Create an account log entry using the authenticated API key's tenant context
      operationId: createAccountLog
      responses:
        "201":
          description: AccountLog created successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PostAccountLog"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "409":
          $ref: "#/components/responses/ConflictError"
        "429":
          $ref: "#/components/responses/RateLimitError"
        "500":
          $ref: "#/components/responses/InternalServerError"
        "503":
          $ref: "#/components/responses/ServiceUnavailableError"
      summary: Create account log entry
      tags:
        - Account Logs
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAccountLogRequest"
        required: true
  /v0/accounts:
    get:
      description: List accounts.
      operationId: listAccounts
      responses:
        "200":
          $ref: "#/components/responses/GetAccountResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "429":
          $ref: "#/components/responses/RateLimitError"
        "500":
          $ref: "#/components/responses/InternalServerError"
        "503":
          $ref: "#/components/responses/ServiceUnavailableError"
      summary: List accounts
      tags:
        - Accounts
      parameters:
        - $ref: "#/components/parameters/CursorQuery"
        - $ref: "#/components/parameters/IncludeEmptyOnlyQuery"
        - $ref: "#/components/parameters/LimitQuery"
    post:
      description: Create or return an account for a domain.
      operationId: createAccount
      responses:
        "200":
          $ref: "#/components/responses/PostAccountResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "409":
          $ref: "#/components/responses/ConflictError"
        "429":
          $ref: "#/components/responses/RateLimitError"
        "500":
          $ref: "#/components/responses/InternalServerError"
        "503":
          $ref: "#/components/responses/ServiceUnavailableError"
      summary: Create account
      tags:
        - Accounts
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAccountRequest"
        required: true
  /v0/accounts/search:
    get:
      description: Search accounts by name or domain.
      operationId: searchAccounts
      responses:
        "200":
          $ref: "#/components/responses/GetAccountResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "429":
          $ref: "#/components/responses/RateLimitError"
        "500":
          $ref: "#/components/responses/InternalServerError"
        "503":
          $ref: "#/components/responses/ServiceUnavailableError"
      summary: Search accounts
      tags:
        - Accounts
      parameters:
        - $ref: "#/components/parameters/CursorQuery"
        - $ref: "#/components/parameters/IncludeEmptyOnlyQuery"
        - $ref: "#/components/parameters/LimitQuery"
        - $ref: "#/components/parameters/QueryQuery"
  /v0/accounts/{account_id}:
    get:
      description: Retrieve a specific account by ID.
      operationId: getAccount
      responses:
        "200":
          $ref: "#/components/responses/PostAccountResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "404":
          $ref: "#/components/responses/NotFoundError"
        "429":
          $ref: "#/components/responses/RateLimitError"
        "500":
          $ref: "#/components/responses/InternalServerError"
        "503":
          $ref: "#/components/responses/ServiceUnavailableError"
      summary: Get account by ID
      tags:
        - Accounts
      parameters:
        - $ref: "#/components/parameters/AccountIdPath"
    patch:
      description: Update an account by ID
      operationId: updateAccount
      responses:
        "200":
          $ref: "#/components/responses/PostAccountResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "404":
          $ref: "#/components/responses/NotFoundError"
        "409":
          $ref: "#/components/responses/ConflictError"
        "429":
          $ref: "#/components/responses/RateLimitError"
        "500":
          $ref: "#/components/responses/InternalServerError"
        "503":
          $ref: "#/components/responses/ServiceUnavailableError"
      summary: Update account by ID
      tags:
        - Accounts
      parameters:
        - $ref: "#/components/parameters/AccountIdPath"
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateAccountRequest"
        required: true
  /v0/accounts/{account_id}/activity:
    get:
      description: Retrieve merged account activity, optionally including linked person activity
      operationId: listAccountActivity
      responses:
        "200":
          description: Successful operation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetActivity"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "404":
          $ref: "#/components/responses/NotFoundError"
        "429":
          $ref: "#/components/responses/RateLimitError"
        "500":
          $ref: "#/components/responses/InternalServerError"
        "503":
          $ref: "#/components/responses/ServiceUnavailableError"
      summary: List account activity
      tags:
        - Account Activity
      parameters:
        - $ref: "#/components/parameters/CursorQuery"
        - in: query
          name: includePersonActivity
          description: includePersonActivity parameter
          required: false
          schema:
            type: string
        - $ref: "#/components/parameters/IncludeDeletedQuery"
        - $ref: "#/components/parameters/LimitQuery"
        - $ref: "#/components/parameters/AccountIdPath"
