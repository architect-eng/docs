openapi: 3.1.0
info:
  contact:
    email: api-support@tryarchitect.com
    name: Architect
    url: https://tryarchitect.com
  description: The Customer API provides a RESTful API for external systems to integrate with the Architect platform.
  title: Architect - Customer API
  version: 0.0.1
servers:
  - description: Production environment
    url: https://api.tryarchitect.com
  - description: Beta environment
    url: https://api.beta.tryarchitect.com
  - description: Local environment
    url: http://localhost:25001
security:
  - apiKey: []
components:
  callbacks: {}
  examples:
    01Example:
      description: Example values extracted from schema defaults
      summary: 01 example
      value:
        title: null
    CreateAudienceRequestExample:
      description: Example values extracted from schema defaults
      summary: CreateAudienceRequest example
      value:
        publishBehavior: publish
    CreatePageRequestExample:
      description: Example values extracted from schema defaults
      summary: CreatePageRequest example
      value:
        actionCardWidgets: []
        pageType: inbound
        scripts: []
    CreateWebhookSubscriptionRequestExample:
      description: Example values extracted from schema defaults
      summary: CreateWebhookSubscriptionRequest example
      value:
        active: true
    ImageExample:
      description: Example values extracted from schema defaults
      summary: Image example
      value:
        altText: null
        url: null
        fileId: null
        assetId: null
    ScriptExample:
      description: Example values extracted from schema defaults
      summary: Script example
      value:
        enabled: true
    VideoExample:
      description: Example values extracted from schema defaults
      summary: Video example
      value:
        title: null
        youtubeUrl: null
        autoplay: false
        loop: false
        controls: true
        muted: null
  headers: {}
  links: {}
  parameters:
    AccountIdPath:
      in: path
      name: account_id
      description: account_id parameter
      required: true
      schema:
        type: string
    AudienceIdPath:
      in: path
      name: audience_id
      description: audience_id parameter
      required: true
      schema:
        type: string
    Cursor:
      description: Opaque cursor for pagination - use nextCursor from previous response
      in: query
      name: cursor
      required: false
      schema:
        type: string
    CursorQuery:
      in: query
      name: cursor
      description: cursor parameter
      required: false
      schema:
        type: string
    EndDateQuery:
      in: query
      name: endDate
      description: endDate parameter
      required: false
      schema:
        type: string
        format: date-time
    IncludeEmptyOnlyQuery:
      in: query
      name: includeEmptyOnly
      description: includeEmptyOnly parameter
      required: false
      schema:
        type: string
    Limit:
      description: Number of items to return (1-100, default 20)
      in: query
      name: limit
      required: false
      schema:
        default: 20
        maximum: 100
        minimum: 1
        type: number
    LimitQuery:
      in: query
      name: limit
      description: limit parameter
      required: false
      schema:
        type: number
    PageIdPath:
      in: path
      name: page_id
      description: page_id parameter
      required: true
      schema:
        type: string
    PageLinkIdPath:
      in: path
      name: page_link_id
      description: page_link_id parameter
      required: true
      schema:
        type: string
    PersonIdPath:
      in: path
      name: person_id
      description: person_id parameter
      required: true
      schema:
        type: string
    QueryQuery:
      in: query
      name: query
      description: query parameter
      required: false
      schema:
        type: string
    StartDateQuery:
      in: query
      name: startDate
      description: startDate parameter
      required: false
      schema:
        type: string
        format: date-time
    SubscriptionIdPath:
      in: path
      name: subscription_id
      description: The webhook subscription ID
      required: true
      schema:
        type: string
    TenantDomainIdQuery:
      in: query
      name: tenantDomainId
      description: Optional tenant domain ID for custom domain. If not provided, uses fallback subdomain.
      required: false
      schema:
        type: string
    VersionIdPath:
      in: path
      name: version_id
      description: version_id parameter
      required: true
      schema:
        type: string
  requestBodies:
    ArchiveBody:
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/CreateArchiveRequest"
      required: true
    VersionsBody:
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/CreateVersionRequest"
      required: true
  responses:
    BadRequest:
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
      description: Bad request - Invalid query parameters
    CommonErrors:
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
      description: Error response - covers authentication, authorization, rate limiting, and server errors
    GetAccountResponse:
      description: Successful operation
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/GetAccount"
    GetPersonResponse:
      description: Successful operation
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/GetPerson"
    GetWebhookSubscriptionResponseResponse:
      description: Successful operation
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/GetWebhookSubscriptionResponse"
    NotFound:
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
      description: Resource not found
    PostAccountResponse:
      description: Successful operation
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/PostAccount"
    PostAudienceResponse:
      description: Audience created successfully
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/PostAudience"
    PostInterruptResponse:
      description: Successful operation
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/PostInterrupt"
    PostPageLinkResponse:
      description: Successful operation
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/PostPageLink"
    PostPageResponse:
      description: Page created successfully
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/PostPage"
    PostPersonResponse:
      description: Person created successfully
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/PostPerson"
    PostVersionResponse:
      description: AudienceVersion created successfully
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/PostVersion"
  schemas:
    ActionIdActionIndexActionTypeButtonTitlePurposeUrlSchema:
      type: object
      properties:
        actionId:
          $ref: "#/components/schemas/ActionId"
        actionIndex:
          type: number
          description: Position in actions array
        purpose:
          type: string
          description: Business purpose or goal of this action
        buttonTitle:
          type: string
          description: Text displayed on the action button
        actionType:
          type: string
          const: open-url
        url:
          $ref: "#/components/schemas/Url"
      required:
        - actionId
        - actionIndex
        - purpose
        - buttonTitle
        - actionType
        - url
      additionalProperties: false
    ActionIdActionIndexActionTypeButtonTitleFormIdFormInstructionsPurposeSchema:
      type: object
      properties:
        actionId:
          $ref: "#/components/schemas/ActionId"
        actionIndex:
          type: number
          description: Position in actions array
        purpose:
          type: string
          description: Business purpose or goal of this action
        buttonTitle:
          type: string
          description: Text displayed on the action button
        actionType:
          type: string
          const: form
        formId:
          $ref: "#/components/schemas/FormId"
        formInstructions:
          type: string
      required:
        - actionId
        - actionIndex
        - purpose
        - buttonTitle
        - actionType
        - formId
      additionalProperties: false
    ActionIdActionIndexActionTypeButtonTitleCopyTextPurposeSchema:
      type: object
      properties:
        actionId:
          $ref: "#/components/schemas/ActionId"
        actionIndex:
          type: number
          description: Position in actions array
        purpose:
          type: string
          description: Business purpose or goal of this action
        buttonTitle:
          type: string
          description: Text displayed on the action button
        actionType:
          type: string
          const: copy-text
        copyText:
          type: string
          description: Text to copy to the visitor's clipboard when the action is triggered
      required:
        - actionId
        - actionIndex
        - purpose
        - buttonTitle
        - actionType
        - copyText
      additionalProperties: false
    TypeVideoSchema:
      type: object
      properties:
        type:
          type: string
          const: video
        video:
          $ref: "#/components/schemas/Video"
      required:
        - type
        - video
      additionalProperties: false
    ActionIdActionTypeButtonTitleFormIdFormInstructionsPurposeSchema:
      type: object
      properties:
        actionId:
          $ref: "#/components/schemas/ActionId"
        purpose:
          type: string
        buttonTitle:
          type: string
        actionType:
          type: string
          const: form
        formId:
          $ref: "#/components/schemas/FormId1"
        formInstructions:
          type: string
      required:
        - purpose
        - buttonTitle
        - actionType
        - formId
      additionalProperties: false
    PageIdRoutingTableTargetTypeSchema:
      type: object
      properties:
        targetType:
          type: string
          const: page
        pageId:
          type: string
        routingTable:
          anyOf:
            - type: array
              items:
                anyOf:
                  - $ref: "#/components/schemas/AudienceIdWeightSchema"
                  - $ref: "#/components/schemas/PreserveQueryParamsTargetUrlWeightSchema"
            - type: "null"
      required:
        - targetType
        - pageId
      additionalProperties: false
    PreserveQueryParamsTargetUrlWeightSchema:
      type: object
      properties:
        targetUrl:
          $ref: "#/components/schemas/Url"
        weight:
          type: integer
          exclusiveMinimum: 0
          maximum: 9007199254740991
        preserveQueryParams:
          type: boolean
      required:
        - targetUrl
        - weight
      additionalProperties: false
    ActionIdActionTypeButtonTitleCopyTextPurposeSchema:
      type: object
      properties:
        actionId:
          $ref: "#/components/schemas/ActionId"
        purpose:
          type: string
        buttonTitle:
          type: string
        actionType:
          type: string
          const: copy-text
        copyText:
          type: string
      required:
        - purpose
        - buttonTitle
        - actionType
        - copyText
      additionalProperties: false
    LogosTitleTypeSchema:
      type: object
      properties:
        type:
          type: string
          const: marquee
        title:
          default: null
          anyOf:
            - type: string
            - type: "null"
        logos:
          type: array
          items:
            $ref: "#/components/schemas/NestedObject"
      required:
        - type
        - title
        - logos
      additionalProperties: false
    UnnamedSchema:
      type: string
      minLength: 1
      pattern: ^accountlog_[a-z0-9]{26}$
    ActionIdActionTypeButtonTitlePurposeUrlSchema:
      type: object
      properties:
        actionId:
          $ref: "#/components/schemas/ActionId"
        purpose:
          type: string
        buttonTitle:
          type: string
        actionType:
          type: string
          const: open-url
        url:
          $ref: "#/components/schemas/Url"
      required:
        - purpose
        - buttonTitle
        - actionType
        - url
      additionalProperties: false
    AudienceIdTargetTypeSchema:
      type: object
      properties:
        targetType:
          type: string
          const: audience
        audienceId:
          type: string
      required:
        - targetType
        - audienceId
      additionalProperties: false
    AudienceIdWeightSchema:
      type: object
      properties:
        audienceId:
          type: string
        weight:
          type: integer
          exclusiveMinimum: 0
          maximum: 9007199254740991
      required:
        - audienceId
        - weight
      additionalProperties: false
    AccountId:
      type: string
      minLength: 1
      pattern: ^account_[a-z0-9]{26}$
    ActionId:
      type: string
      pattern: ^pagegroupaction_
      description: TypeID identifier for the action
    ArraySchema:
      type: array
      items:
        $ref: "#/components/schemas/GetWebhookSubscriptionResponse"
    CreateAccountLogRequest:
      type: object
      properties:
        accountId:
          $ref: "#/components/schemas/AccountId"
        domain:
          type: string
          minLength: 1
        name:
          type: string
          minLength: 1
          maxLength: 255
        source:
          $ref: "#/components/schemas/Source"
        type:
          $ref: "#/components/schemas/Type"
        idempotencyKey:
          type: string
          minLength: 1
          maxLength: 255
        payload:
          type: object
          propertyNames:
            type: string
          additionalProperties: {}
      required:
        - source
        - type
        - payload
      additionalProperties: false
    CreateAccountRequest:
      type: object
      properties:
        domain:
          type: string
          minLength: 1
          description: Canonical account domain
        name:
          type: string
          minLength: 1
          maxLength: 255
      required:
        - domain
      additionalProperties: false
    CreateArchiveRequest:
      type: object
      properties: {}
      additionalProperties: false
    CreateAudienceRequest:
      type: object
      properties:
        actionFormIdOverride:
          type: string
        actionFormInstructionsOverride:
          type: string
        actionUrlOverride:
          $ref: "#/components/schemas/Url"
        customName:
          type: string
          minLength: 1
        metadataOverride:
          $ref: "#/components/schemas/Metadata1"
        publishBehavior:
          default: publish
          type: string
          enum:
            - draft
            - publish
        supplementaryContext:
          type: string
          minLength: 1
      required:
        - publishBehavior
      additionalProperties: false
    CreateInterruptRequest:
      type: object
      properties:
        partialText:
          type: string
          maxLength: 100000
      additionalProperties: false
    CreateMessageRequest:
      type: object
      properties:
        message:
          type: string
          minLength: 1
          maxLength: 8000
        clientMessageId:
          type: string
          minLength: 1
          maxLength: 100
        selectedElement:
          type: object
          properties:
            sectionId:
              type: string
              maxLength: 200
            elementId:
              type: string
              maxLength: 200
            elementType:
              type: string
              maxLength: 100
            sectionTitle:
              anyOf:
                - type: string
                  maxLength: 1000
                - type: "null"
            content:
              anyOf:
                - type: string
                  maxLength: 1000
                - type: "null"
            selectedText:
              anyOf:
                - type: string
                  maxLength: 1000
                - type: "null"
            componentIndex:
              type: integer
              minimum: 0
              maximum: 9007199254740991
            jsonPath:
              anyOf:
                - type: string
                  maxLength: 500
                - type: "null"
          required:
            - sectionId
            - elementId
            - elementType
            - sectionTitle
            - content
          additionalProperties: false
      required:
        - message
      additionalProperties: false
    CreatePageLinkRequest:
      type: object
      properties:
        tenantDomainId:
          anyOf:
            - type: string
            - type: "null"
        path:
          type: string
          minLength: 1
        target:
          anyOf:
            - $ref: "#/components/schemas/AudienceIdTargetTypeSchema"
            - type: object
              properties:
                targetType:
                  type: string
                  const: page
                pageId:
                  type: string
                routingTable:
                  anyOf:
                    - type: array
                      items:
                        anyOf:
                          - $ref: "#/components/schemas/AudienceIdWeightSchema"
                          - $ref: "#/components/schemas/PreserveQueryParamsTargetUrlWeightSchema"
                    - type: "null"
              required:
                - targetType
                - pageId
              additionalProperties: false
      required:
        - path
        - target
      additionalProperties: false
    CreatePageRequest:
      type: object
      properties:
        actions:
          type: array
          items:
            anyOf:
              - $ref: "#/components/schemas/ActionIdActionTypeButtonTitlePurposeUrlSchema"
              - $ref: "#/components/schemas/ActionIdActionTypeButtonTitleFormIdFormInstructionsPurposeSchema"
              - $ref: "#/components/schemas/ActionIdActionTypeButtonTitleCopyTextPurposeSchema"
        actionCardWidgets:
          default: []
          type: array
          items:
            oneOf:
              - $ref: "#/components/schemas/LogosTitleTypeSchema"
              - $ref: "#/components/schemas/TypeVideoSchema"
        brandId:
          type: string
        footerLinks:
          type: array
          items:
            $ref: "#/components/schemas/FooterLink"
        headerActionId:
          type: string
        metadata:
          $ref: "#/components/schemas/Metadata1"
        name:
          type: string
          minLength: 1
        pageContext:
          type: string
          minLength: 1
        pageType:
          default: inbound
          type: string
          enum:
            - inbound
            - outbound
            - call_followup
            - sales_deck
            - custom
        scripts:
          default: []
          type: array
          items:
            $ref: "#/components/schemas/Script"
      required:
        - actions
        - actionCardWidgets
        - brandId
        - footerLinks
        - name
        - pageContext
        - pageType
        - scripts
      additionalProperties: false
    CreatePersonLogRequest:
      type: object
      properties:
        personId:
          $ref: "#/components/schemas/PersonId"
        email:
          type: string
        phoneNumber:
          $ref: "#/components/schemas/UnnamedSchema"
        linkedinProfileUrl:
          type: string
          minLength: 1
        source:
          $ref: "#/components/schemas/Source"
        type:
          $ref: "#/components/schemas/Type"
        idempotencyKey:
          type: string
          minLength: 1
          maxLength: 255
        name:
          type: string
          minLength: 1
          maxLength: 255
        payload:
          type: object
          propertyNames:
            type: string
          additionalProperties: {}
      required:
        - source
        - type
        - payload
      additionalProperties: false
    CreatePersonRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 255
        email:
          type: string
        domain:
          type: string
          minLength: 1
        phoneNumber:
          $ref: "#/components/schemas/UnnamedSchema"
        linkedinProfileUrl:
          type: string
          minLength: 1
      required:
        - name
      additionalProperties: false
    CreateVersionRequest:
      type: object
      properties:
        operationKey:
          type: string
          minLength: 1
          maxLength: 128
      additionalProperties: false
    CreateWebhookSubscriptionRequest:
      type: object
      properties:
        url:
          $ref: "#/components/schemas/Url"
        events:
          type: array
          items:
            type: string
            enum:
              - page.version.created
              - page.version.processed
              - page.version.published
              - form.submitted
              - form.enriched
              - form.enrichment_failed
        active:
          default: true
          description: Whether the subscription should be active
          examples:
            - true
          type: boolean
      required:
        - url
        - events
        - active
      additionalProperties: false
    DeletePageResponse:
      type: object
      properties:
        success:
          type: boolean
          const: true
      required:
        - success
      additionalProperties: false
    Error:
      properties:
        code:
          enum:
            - UNAUTHORIZED
            - FORBIDDEN
            - NOT_FOUND
            - VALIDATION_ERROR
            - CONFLICT
            - RATE_LIMITED
            - INTERNAL
          examples:
            - VALIDATION_ERROR
            - UNAUTHORIZED
            - NOT_FOUND
          type: string
        details:
          examples:
            - field: name
              reason: Name is required
        message:
          examples:
            - Validation failed
            - Authentication required
            - Resource not found
            - Rate limit exceeded
          type: string
        requestId:
          examples:
            - req_01j5k9m7n8p9q2r3s4t5v6w7x8
          type: string
      required:
        - code
        - message
        - requestId
      type: object
    FooterLink:
      type: object
      properties:
        id:
          type: string
        links:
          type: array
          items:
            $ref: "#/components/schemas/NestedObject1"
        title:
          type: string
      required:
        - links
        - title
      additionalProperties: false
    FormId:
      type: string
      pattern: ^form_
      description: TypeID identifier for the form to display
    FormId1:
      type: string
      minLength: 1
      pattern: ^form_[a-z0-9]{26}$
    GetAccount:
      type: object
      properties:
        hasMore:
          type: boolean
        items:
          type: array
          items:
            type: object
            properties:
              accountId:
                $ref: "#/components/schemas/AccountId"
              tenantId:
                type: string
              domain:
                type: string
                minLength: 1
              name:
                anyOf:
                  - type: string
                    minLength: 1
                    maxLength: 255
                  - type: "null"
              createdAt:
                $ref: "#/components/schemas/UnnamedSchema"
              updatedAt:
                $ref: "#/components/schemas/UnnamedSchema"
              latestActivityAt:
                anyOf:
                  - $ref: "#/components/schemas/UnnamedSchema"
                  - type: "null"
              linkedPersonsCount:
                type: integer
                minimum: 0
                maximum: 9007199254740991
            required:
              - accountId
              - tenantId
              - domain
              - name
              - createdAt
              - updatedAt
              - latestActivityAt
              - linkedPersonsCount
            additionalProperties: false
        nextCursor:
          anyOf:
            - type: string
            - type: "null"
        totalCount:
          type: integer
          minimum: 0
          maximum: 9007199254740991
      required:
        - hasMore
        - items
        - nextCursor
        - totalCount
      additionalProperties: false
    GetActivity:
      type: object
      properties:
        items:
          type: array
          items:
            type: object
            properties:
              activityId:
                type: string
                minLength: 1
                description: Stable identifier for the activity item
              activityType:
                type: string
                enum:
                  - account-log-entry
                  - person-log-entry
                description: Whether the activity originated from the account itself or a linked person
              accountId:
                $ref: "#/components/schemas/AccountId"
              accountLogId:
                anyOf:
                  - $ref: "#/components/schemas/UnnamedSchema"
                  - type: "null"
              personId:
                anyOf:
                  - $ref: "#/components/schemas/PersonId"
                  - type: "null"
              personLogId:
                anyOf:
                  - $ref: "#/components/schemas/UnnamedSchema"
                  - type: "null"
              personName:
                anyOf:
                  - type: string
                  - type: "null"
              source:
                $ref: "#/components/schemas/Source"
              type:
                $ref: "#/components/schemas/Source"
              payload:
                type: object
                propertyNames:
                  type: string
                additionalProperties: {}
              idempotencyKey:
                anyOf:
                  - type: string
                    minLength: 1
                    maxLength: 255
                  - type: "null"
              createdAt:
                $ref: "#/components/schemas/UnnamedSchema"
              updatedAt:
                anyOf:
                  - $ref: "#/components/schemas/UnnamedSchema"
                  - type: "null"
              deletedAt:
                anyOf:
                  - $ref: "#/components/schemas/UnnamedSchema"
                  - type: "null"
            required:
              - activityId
              - activityType
              - accountId
              - accountLogId
              - personId
              - personLogId
              - personName
              - source
              - type
              - payload
              - idempotencyKey
              - createdAt
              - updatedAt
              - deletedAt
            additionalProperties: false
        totalCount:
          type: integer
          minimum: 0
          maximum: 9007199254740991
        hasMore:
          type: boolean
        nextOffset:
          anyOf:
            - type: integer
              minimum: 0
              maximum: 9007199254740991
            - type: "null"
      required:
        - items
        - totalCount
        - hasMore
        - nextOffset
      additionalProperties: false
    GetAudience:
      type: object
      properties:
        items:
          type: array
          items:
            type: object
            properties:
              avgInteractionsPerSession:
                type: number
              avgScrollDepthPercentage:
                anyOf:
                  - type: number
                  - type: "null"
              avgTimeSpentSeconds:
                anyOf:
                  - type: number
                  - type: "null"
              bounceRate:
                type: number
              conversionRate:
                type: number
              formSubmitRate:
                type: number
              totalSessions:
                type: number
              audienceId:
                type: string
              bounceCount:
                type: number
              bounceEligibleSessions:
                type: number
              conversionCount:
                type: number
              ctaSessions:
                type: number
              formSubmitCount:
                type: number
            required:
              - avgInteractionsPerSession
              - avgScrollDepthPercentage
              - avgTimeSpentSeconds
              - bounceRate
              - conversionRate
              - formSubmitRate
              - totalSessions
              - audienceId
              - bounceCount
              - bounceEligibleSessions
              - conversionCount
              - ctaSessions
              - formSubmitCount
            additionalProperties: false
      required:
